<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Emprendiendo con AI · Parte 1 · Market Researcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,700;0,800;0,900;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #e6e6e4;
  --ink: #0f0f0f;
  --ink2: #555;
  --ink3: #999;
  --neon: #ff4d00;
  --neon-glow: rgba(255,77,0,0.2);
  --border: rgba(0,0,0,0.1);
  --claude: #cc785c;
}

html, body { margin: 0; padding: 0; background: #222; }

/* Scale to viewport so it looks right when previewed at any size — the actual export is 1080×1920 */
.thumb-wrap {
  width: 1080px; height: 1920px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Poppins', system-ui, sans-serif;
  color: var(--ink);
}

.thumb-wrap::before {
  content: '';
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 320px 320px; opacity: 0.18; mix-blend-mode: multiply;
}

.thumb-wrap::after {
  content: '';
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 15% 12%, rgba(255,255,255,0.95) 0%, transparent 48%),
    radial-gradient(ellipse at 85% 90%, rgba(255,77,0,0.18) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(200,200,198,0.25) 0%, transparent 70%);
}

.frame {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  padding: 110px 90px;
  display: flex; flex-direction: column;
}

/* Top header */
.top {
  display: flex; justify-content: space-between; align-items: flex-start;
}
.brand {
  font-family: 'Poppins', sans-serif;
  font-size: 36px; font-weight: 700;
  letter-spacing: -0.015em;
}
.brand .accent { color: var(--neon); }
.series-tag {
  font-family: 'DM Mono', monospace;
  font-size: 26px; font-weight: 400;
  color: var(--ink3); letter-spacing: 0.15em;
  text-transform: uppercase;
  text-align: right; line-height: 1.35;
}
.series-tag .top-line { display: block; }
.series-tag .bot-line { display: block; color: var(--ink2); }

/* Center hero */
.middle {
  flex: 1;
  display: flex; flex-direction: column; justify-content: center;
  padding-top: 60px;
  text-align: center;
}

.parte {
  display: flex; align-items: center; gap: 28px;
  font-family: 'DM Mono', monospace;
  font-size: 30px; font-weight: 500;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink2);
  margin-bottom: 60px;
  justify-content: center;
}
.parte::before, .parte::after {
  content: ''; flex: 1; height: 2px; background: var(--neon);
}

.hero-title {
  font-family: 'Poppins', sans-serif;
  font-weight: 900;
  font-size: 156px;
  line-height: 0.94;
  letter-spacing: -0.04em;
  color: var(--ink);
}
.hero-title .accent {
  color: var(--neon);
}

.subtitle {
  margin: 70px auto 0;
  font-family: 'Poppins', sans-serif;
  font-size: 44px; font-weight: 300;
  line-height: 1.3;
  color: var(--ink2);
  max-width: 820px;
  letter-spacing: -0.005em;
}
.subtitle strong { color: var(--ink); font-weight: 600; }

/* Bottom — Claude logo */
.bottom {
  display: flex; justify-content: center; align-items: flex-end;
  margin-top: 60px;
}
.claude-logo {
  width: 380px; height: auto;
  display: block;
}

/* Helper to preview at scale */
@media (max-width: 1100px) {
  body { display: flex; align-items: flex-start; justify-content: center; padding: 16px; }
  .thumb-wrap { transform: scale(calc(100vw / 1080)); transform-origin: top center; }
}
</style>
</head>
<body>
<div class="thumb-wrap">
  <div class="frame">

    <div class="top">
      <div class="brand">Building with Eli<span class="accent">.</span></div>
      <div class="series-tag">
        <span class="top-line">Emprendiendo</span>
        <span class="bot-line">con AI</span>
      </div>
    </div>

    <div class="middle">
      <div class="parte">Parte 1</div>
      <h1 class="hero-title">Market<br>Researcher<span class="accent">.</span></h1>
      <p class="subtitle">
        Construye tu primer agente de <strong>inteligencia de mercado</strong> en minutos.
      </p>
    </div>

    <div class="bottom">
      <img src="Claude_Logo.png" alt="Claude" class="claude-logo">
    </div>

  </div>
</div>
</body>
</html>
